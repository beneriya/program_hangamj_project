services:
  mysql:
    image: mysql:8.0
    container_name: kr3_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: kr3db
      MYSQL_USER: kr3user
      MYSQL_PASSWORD: kr3pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: kr3_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: kr3db
      DB_USER: kr3user
      DB_PASSWORD: kr3pass
      JWT_SECRET: change_this_secret_in_prod
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/frontend

volumes:
  mysql_data:
