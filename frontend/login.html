<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ нэвтрэх</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px; margin-top: 10vh;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
          <h4 class="mt-2 mb-0">Админ нэвтрэх</h4>
          <small class="text-muted">KR3 удирдлагын хэсэг</small>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Хэрэглэгчийн нэр</label>
            <input type="text" class="form-control" id="username" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Нууц үг</label>
            <input type="password" class="form-control" id="password" required />
          </div>
          <div id="loginError" class="alert alert-danger d-none py-2"></div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/" class="text-muted small">← Нүүр хуудас руу буцах</a>
        </div>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">
      Default: admin / admin123
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
