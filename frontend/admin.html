<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ Удирдлага — KR3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/admin.html">
        <i class="bi bi-gear-fill me-2"></i>Админ — KR3
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="text-white-50 small" id="adminUser"></span>
        <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-house"></i></a>
        <button id="logoutBtn" class="btn btn-outline-warning btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Гарах
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="row">
      <!-- Sidebar: items list -->
      <aside class="col-md-4 col-lg-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="mb-0">Шалгуурууд</h5>
          <button class="btn btn-sm btn-success" id="newItemBtn">
            <i class="bi bi-plus-lg"></i> Шинэ
          </button>
        </div>
        <input id="adminSearch" class="form-control form-control-sm mb-2" placeholder="Хайх..." />
        <div id="adminList" class="list-group shadow-sm small"></div>
      </aside>

      <!-- Editor -->
      <section class="col-md-8 col-lg-9">
        <div id="editorArea">
          <div class="text-center text-muted py-5">
            <i class="bi bi-arrow-left-circle" style="font-size: 2rem;"></i>
            <p class="mt-2">Зүүн талаас шалгуур сонго, эсвэл шинэ шалгуур нэм</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Modal: table editor -->
  <div class="modal fade" id="tableModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Хүснэгт засах</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Хүснэгтийн гарчиг</label>
            <input id="tblTitle" class="form-control" />
          </div>
          <div class="mb-2 d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">Мөрүүд</label>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" id="tblAddCol"><i class="bi bi-plus-lg"></i> Багана</button>
              <button class="btn btn-outline-primary" id="tblAddRow"><i class="bi bi-plus-lg"></i> Мөр</button>
            </div>
          </div>
          <div class="table-responsive" style="max-height: 50vh;">
            <table class="table table-sm table-bordered align-middle" id="tblEditor">
              <thead class="table-light"></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Болих</button>
          <button type="button" class="btn btn-primary" id="tblSave">Хадгалах</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastArea" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
